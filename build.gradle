// Top-level build file where you can add configuration options common to all sub-projects/modules.
// 只在本地构建时应用 publish-aars.gradle
if (file('publish-aars.gradle').exists()) {
    apply from: 'publish-aars.gradle'
}
buildscript {
    ext {
        kotlin_version = "1.9.22"
        compile_version = 35
        min_version = 26
        target_version = 35
        rnVersion = "0.77.2"
        
        // ✅ 发布配置 - 所有模块使用统一版本
        PUBLISH_GROUP_ID = 'com.github.Bean-V'
        PUBLISH_VERSION = '2.0.5'  // 多模块发布版本（修复子模块依赖问题）
    }
    repositories {
        mavenLocal()

        // 优先使用阿里云镜像加速
        // 官方仓库
        google()
        mavenCentral()
        gradlePluginPortal()
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/jcenter' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
        maven { url "https://maven.aliyun.com/nexus/content/repositories/releases" }

        // 官方仓库（阿里云未同步时使用）
        google()
        mavenCentral()
        gradlePluginPortal()

        // 第三方仓库（按需添加）
        maven { url 'https://jitpack.io' }
        maven { url "https://github.com/jitsi/jitsi-maven-repository/raw/master/releases" }
        maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
        maven { url 'https://developer.huawei.com/repo/' }
    }
    dependencies {
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"

        classpath 'com.android.tools.build:gradle:8.10.1'

    }
}


allprojects {

    configurations.configureEach {
        resolutionStrategy {
            eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'com.facebook.react') {
                    if (details.requested.name == 'react-native') {
                        details.useTarget "com.facebook.react:react-android:$rnVersion"
                    }
                    if (details.requested.name == 'react-android') {
                        details.useVersion rootProject.ext.rnVersion
                    }
                }
                // 统一 Material 版本，避免资源冲突
                if (details.requested.group == 'com.google.android.material' && details.requested.name == 'material') {
                    details.useVersion '1.10.0'
                }

                if (details.requested.group == 'org.jetbrains.kotlin') {
                    details.useVersion kotlin_version
                }
            }
        }
    }


    repositories {
        mavenLocal()
        // 本地仓库优先
        //maven { url rootProject.file('repository') }
        // 官方仓库
        google()
        mavenCentral()
        gradlePluginPortal()

        // 镜像仓库加速
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/jcenter' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
        maven { url "https://maven.aliyun.com/nexus/content/repositories/releases" }



        // 第三方仓库
        maven { url 'https://jitpack.io' }
        maven { url "https://github.com/jitsi/jitsi-maven-repository/raw/master/releases" }
        maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
        maven { url 'https://developer.huawei.com/repo/' }
    }
}


tasks.register('clean', Delete) {
    delete layout.buildDirectory
}

// ================================================
// 为所有子模块配置发布
// ================================================
subprojects {
    afterEvaluate { project ->
        // 只为 Android Library 模块应用发布配置
        if (project.plugins.hasPlugin('com.android.library')) {
            // omm-lib 使用自己的 build_publishing.gradle，跳过通用配置
            if (project.name != 'omm-lib') {
                // 应用通用发布配置
                project.apply from: "${rootProject.projectDir}/publish-module.gradle"
                
                println "✅ [根配置] ${project.name} 已应用发布配置"
            }
        }
    }
}
dependencies {
//    implementation fileTree(include: ['*.jar','*.aar'], dir: 'libs')
    implementation fileTree(include: ['*.jar'], dir: 'libs')

//    implementation files('libs/barcodescanner-release.aar')

    //    implementation "com.android.support:appcompat-v7:24.2.1"
    //    implementation "com.android.support:support-v4:26+"
    implementation 'androidx.appcompat:appcompat:1.3.1'
    implementation 'com.squareup.okhttp3:okhttp-urlconnection:3.10.0'
    //    implementation "com.dmcBig:mediapicker:+"
    //scanner
//    implementation(name:'OcrPlateidLibrary', ext:'aar')
//    implementation(name:'barcodescanner-release', ext:'aar')
    implementation files('libs/TCardApi.jar')
    implementation 'androidx.media:media:1.0.0@aar'
    //    implementation "com.android.support:support-annotations:+"
    implementation 'androidx.annotation:annotation:1.0.0'
    //快速KEY-VALUE存取库
    implementation 'com.jeremyliao:fast-sharedpreferences:0.0.1'
    //exoplayer
    //implementation 'com.google.android.exoplayer:exoplayer:2.11.3'
    implementation "com.squareup.picasso:picasso:2.5.2"
//    implementation project(':YZxing-lib')
    implementation project(path: ':basemodule')
    implementation project(path: ':AppStore')
    implementation project(path: ':sound_recon')

    //沉浸式
    implementation 'com.zhangmonke:ImmerseLayout:2.0.3'

//    compileOnly 'pl.droidsonroids.gif:android-gif-drawable:1.2.24'

    //图片压缩
    implementation 'top.zibin:Luban:1.1.8'
    implementation project(path: ':oort_imagepick_sdk')

    implementation 'org.greenrobot:eventbus:3.1.1'

    implementation 'com.google.android.exoplayer:exoplayer:2.18.1'
    implementation files('libs/STReadCardV2.0.14.jar')
    implementation project(':IDCardCheck')
    // ✅ 移除重复的 JAR 依赖 - 已通过 project(':IDCardCheck') 传递依赖获得
    // implementation files('../IDCardCheck/libs/zkandroididcardreader.jar')
    implementation libs.iplayer

    // implementation 'net.alphacep:vosk-android:0.3.47'




}

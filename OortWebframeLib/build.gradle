    ext.appShortcutBadgerVersion = '1.1.22'
}

if (!project.ext.has('appShortcutBadgerCustom')) {
    dependencies {
        implementation "me.leolin:ShortcutBadger:${appShortcutBadgerVersion}@aar"
    }
}
